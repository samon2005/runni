<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNNI - Mapa de Expansión Inteligente</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Heat -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: white;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }
        
        .logo span {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            padding: 10px 20px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover {
            background: white;
            color: #667eea;
        }
        
        .nav-btn.active {
            background: white;
            color: #667eea;
        }
        
        #map {
            height: calc(100vh - 80px);
            width: 100%;
        }
        
        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            color: #333;
            max-width: 320px;
            z-index: 1000;
        }
        
        .info-panel h3 {
            margin-bottom: 10px;
            color: #667eea;
            font-size: 1.1rem;
        }
        
        .info-panel p {
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        
        .legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            color: #333;
            z-index: 1000;
            font-size: 0.85rem;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 5px 0;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 2000;
            text-align: center;
            color: #333;
        }
        
        .loading.hidden {
            display: none;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 10px 15px;
            }
            .logo h1 {
                font-size: 1.3rem;
            }
            .nav-btn {
                padding: 8px 15px;
                font-size: 0.8rem;
            }
            .info-panel, .legend {
                max-width: 250px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>RUNNI</h1>
            <span>Expansión Inteligente - Valle de Aburrá</span>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn active" onclick="showMap('rutas')">Rutas Bello</button>
            <button class="nav-btn" onclick="showMap('domicilios')">Mapa Domicilios</button>
            <button class="nav-btn" onclick="showMap('runni')">Mapa Runni</button>
        </div>
    </div>
    
    <div id="map"></div>
    
    <div class="info-panel" id="infoPanel">
        <h3 id="infoTitle">Rutas Principales - Bello</h3>
        <p id="infoText">Visualización de las rutas más transitadas en el municipio de Bello para la expansión del servicio Runni.</p>
    </div>
    
    <div class="legend" id="legend"></div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Cargando mapa...</p>
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN INICIAL
        // ============================================================
        
        let map;
        let currentLayers = [];
        let heatLayer = null;
        
        // Centro de Bello
        const BELLO_CENTER = [6.3389, -75.5578];
        // Centro Valle de Aburrá
        const VALLE_CENTER = [6.2200, -75.5800];
        
        // ============================================================
        // DATOS DE RUTAS PRINCIPALES EN BELLO
        // ============================================================
        
        const rutasBello = [
            {
                nombre: "Av. 52 (Carrera 52 - Eje Principal)",
                descripcion: "Eje comercial principal de Bello, conecta con Medellín",
                tipo: "principal",
                coords: [
                    [6.3550, -75.5545],
                    [6.3480, -75.5550],
                    [6.3389, -75.5578],
                    [6.3300, -75.5600],
                    [6.3200, -75.5620]
                ]
            },
            {
                nombre: "Calle 50 - Centro de Bello",
                descripcion: "Zona comercial del centro, alta actividad peatonal",
                tipo: "principal",
                coords: [
                    [6.3389, -75.5650],
                    [6.3389, -75.5578],
                    [6.3389, -75.5500]
                ]
            },
            {
                nombre: "Ruta Estación Metro Bello",
                descripcion: "Conexión desde Metro Bello hacia el centro",
                tipo: "metro",
                coords: [
                    [6.3375, -75.5555],
                    [6.3389, -75.5578],
                    [6.3400, -75.5600],
                    [6.3420, -75.5630]
                ]
            },
            {
                nombre: "Carrera 50 - Eje Comercial",
                descripcion: "Segunda vía comercial importante",
                tipo: "secundaria",
                coords: [
                    [6.3450, -75.5600],
                    [6.3400, -75.5590],
                    [6.3350, -75.5580],
                    [6.3300, -75.5570]
                ]
            },
            {
                nombre: "Ruta Niquía",
                descripcion: "Conexión hacia el norte - zona residencial",
                tipo: "secundaria",
                coords: [
                    [6.3389, -75.5578],
                    [6.3450, -75.5550],
                    [6.3520, -75.5520],
                    [6.3580, -75.5480]
                ]
            },
            {
                nombre: "Diagonal 52 - Conexión Copacabana",
                descripcion: "Ruta hacia Copacabana, uso frecuente",
                tipo: "secundaria",
                coords: [
                    [6.3450, -75.5545],
                    [6.3500, -75.5500],
                    [6.3550, -75.5450],
                    [6.3600, -75.5400]
                ]
            },
            {
                nombre: "Circuito Parque de Bello",
                descripcion: "Zona recreativa, ideal para ciclismo",
                tipo: "recreativa",
                coords: [
                    [6.3370, -75.5600],
                    [6.3380, -75.5580],
                    [6.3395, -75.5570],
                    [6.3405, -75.5585],
                    [6.3395, -75.5605],
                    [6.3370, -75.5600]
                ]
            }
        ];
        
        // Puntos de interés en Bello
        const puntosBello = [
            { nombre: "Centro de Bello", lat: 6.3389, lon: -75.5578, tipo: "centro", icono: "🏛️" },
            { nombre: "Estación Metro Bello", lat: 6.3375, lon: -75.5555, tipo: "metro", icono: "🚇" },
            { nombre: "Estación Metro Niquía", lat: 6.3520, lon: -75.5520, tipo: "metro", icono: "🚇" },
            { nombre: "Plaza de Bello", lat: 6.3395, lon: -75.5585, tipo: "plaza", icono: "🌳" },
            { nombre: "Centro Comercial Puerta del Norte", lat: 6.3350, lon: -75.5530, tipo: "comercial", icono: "🛒" },
            { nombre: "Hospital Marco Fidel Suárez", lat: 6.3420, lon: -75.5610, tipo: "hospital", icono: "🏥" },
            { nombre: "Punto Sugerido Estación Runni 1", lat: 6.3389, lon: -75.5578, tipo: "runni", icono: "🚲" },
            { nombre: "Punto Sugerido Estación Runni 2", lat: 6.3520, lon: -75.5520, tipo: "runni", icono: "🚲" }
        ];
        
        // ============================================================
        // DATOS DE RESTAURANTES (MAPA DOMICILIOS)
        // ============================================================
        
        const zonasRestaurantes = [
            { nombre: "El Poblado / Parque Lleras", lat: 6.2086, lon: -75.5680, peso: 1.0, cantidad: 80 },
            { nombre: "Envigado Centro", lat: 6.1752, lon: -75.5940, peso: 0.9, cantidad: 60 },
            { nombre: "Laureles / Estadio", lat: 6.2480, lon: -75.5897, peso: 0.8, cantidad: 55 },
            { nombre: "Sabaneta Parque", lat: 6.1514, lon: -75.6160, peso: 0.7, cantidad: 40 },
            { nombre: "Itagüí Centro", lat: 6.1849, lon: -75.5990, peso: 0.6, cantidad: 35 },
            { nombre: "Av. El Poblado", lat: 6.1950, lon: -75.5760, peso: 0.85, cantidad: 45 },
            { nombre: "Bello Centro", lat: 6.3389, lon: -75.5578, peso: 0.5, cantidad: 30 },
            { nombre: "Centro Medellín", lat: 6.2518, lon: -75.5636, peso: 0.9, cantidad: 70 },
            { nombre: "Belén", lat: 6.2350, lon: -75.6100, peso: 0.6, cantidad: 40 },
            { nombre: "Robledo", lat: 6.2700, lon: -75.5950, peso: 0.5, cantidad: 25 },
            { nombre: "Sabaneta Sur / La Doctora", lat: 6.1400, lon: -75.6180, peso: 0.6, cantidad: 20 },
            { nombre: "Caldas", lat: 6.0940, lon: -75.6350, peso: 0.4, cantidad: 15 }
        ];
        
        // ============================================================
        // DATOS USO BICICLETAS (MAPA RUNNI)
        // ============================================================
        
        const zonasRunni = [
            { nombre: "El Poblado", lat: 6.2086, lon: -75.5680, actividad: 150 },
            { nombre: "Envigado Centro", lat: 6.1752, lon: -75.5940, actividad: 120 },
            { nombre: "Laureles", lat: 6.2441, lon: -75.5897, actividad: 100 },
            { nombre: "Sabaneta", lat: 6.1514, lon: -75.6160, actividad: 80 },
            { nombre: "Itagüí Centro", lat: 6.1849, lon: -75.5990, actividad: 70 },
            { nombre: "Av. El Poblado", lat: 6.1900, lon: -75.5750, actividad: 90 },
            { nombre: "Bello Centro", lat: 6.3389, lon: -75.5578, actividad: 50 },
            { nombre: "Estadio", lat: 6.2567, lon: -75.5894, actividad: 60 }
        ];
        
        // Estaciones actuales Runni
        const estacionesRunni = [
            { nombre: "Sede principal - Socya Guayabal", lat: 6.2321, lon: -75.5815 },
            { nombre: "Estación Laureles", lat: 6.2441, lon: -75.5897 },
            { nombre: "Estación Olaya Herrera (nuevo)", lat: 6.2138, lon: -75.5852 }
        ];
        
        // ============================================================
        // INICIALIZACIÓN DEL MAPA
        // ============================================================
        
        function initMap() {
            map = L.map('map').setView(BELLO_CENTER, 14);
            
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap contributors © CARTO',
                maxZoom: 19
            }).addTo(map);
            
            // Mostrar rutas de Bello por defecto
            showMap('rutas');
            
            document.getElementById('loading').classList.add('hidden');
        }
        
        // ============================================================
        // FUNCIONES DE VISUALIZACIÓN
        // ============================================================
        
        function clearLayers() {
            currentLayers.forEach(layer => map.removeLayer(layer));
            currentLayers = [];
            if (heatLayer) {
                map.removeLayer(heatLayer);
                heatLayer = null;
            }
        }
        
        function updateButtons(active) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        function showMap(tipo) {
            clearLayers();
            updateButtons(tipo);
            
            switch(tipo) {
                case 'rutas':
                    showRutasBello();
                    break;
                case 'domicilios':
                    showMapaDomicilios();
                    break;
                case 'runni':
                    showMapaRunni();
                    break;
            }
        }
        
        // ============================================================
        // MAPA 1: RUTAS DE BELLO
        // ============================================================
        
        function showRutasBello() {
            map.setView(BELLO_CENTER, 14);
            
            const colores = {
                principal: '#e74c3c',
                metro: '#3498db',
                secundaria: '#f39c12',
                recreativa: '#2ecc71'
            };
            
            // Dibujar rutas
            rutasBello.forEach(ruta => {
                const polyline = L.polyline(ruta.coords, {
                    color: colores[ruta.tipo],
                    weight: ruta.tipo === 'principal' ? 6 : 4,
                    opacity: 0.8
                }).addTo(map);
                
                polyline.bindPopup(`
                    <b>${ruta.nombre}</b><br>
                    <small>${ruta.descripcion}</small><br>
                    <span style="color: ${colores[ruta.tipo]}">● Ruta ${ruta.tipo}</span>
                `);
                
                currentLayers.push(polyline);
            });
            
            // Dibujar puntos de interés
            puntosBello.forEach(punto => {
                const marker = L.marker([punto.lat, punto.lon], {
                    icon: L.divIcon({
                        className: 'custom-marker',
                        html: `<div style="font-size: 24px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">${punto.icono}</div>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    })
                }).addTo(map);
                
                const color = punto.tipo === 'runni' ? '#667eea' : '#333';
                marker.bindPopup(`
                    <b style="color: ${color}">${punto.nombre}</b><br>
                    <small>${punto.tipo === 'runni' ? '🚲 Punto sugerido para estación Runni' : ''}</small>
                `);
                
                currentLayers.push(marker);
            });
            
            // Actualizar panel de información
            document.getElementById('infoTitle').textContent = 'Rutas Principales - Bello';
            document.getElementById('infoText').innerHTML = `
                <strong>Análisis de rutas para expansión Runni</strong><br><br>
                Se identificaron <b>7 rutas principales</b> en Bello con alto potencial para el servicio de bicicletas.<br><br>
                <b>Puntos sugeridos para estaciones:</b><br>
                • Centro de Bello (Plaza principal)<br>
                • Estación Metro Niquía
            `;
            
            // Actualizar leyenda
            document.getElementById('legend').innerHTML = `
                <b>Leyenda - Rutas Bello</b><br><br>
                <div class="legend-item">
                    <div class="legend-color" style="background: #e74c3c"></div>
                    <span>Ruta principal</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #3498db"></div>
                    <span>Conexión Metro</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #f39c12"></div>
                    <span>Ruta secundaria</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #2ecc71"></div>
                    <span>Ruta recreativa</span>
                </div>
                <div class="legend-item">
                    <span>🚲 Estación sugerida</span>
                </div>
            `;
        }
        
        // ============================================================
        // MAPA 2: MAPA DE DOMICILIOS (CALOR)
        // ============================================================
        
        function showMapaDomicilios() {
            map.setView(VALLE_CENTER, 12);
            
            // Generar puntos para el heatmap
            let heatData = [];
            zonasRestaurantes.forEach(zona => {
                for (let i = 0; i < zona.cantidad; i++) {
                    const lat = zona.lat + (Math.random() - 0.5) * 0.02;
                    const lon = zona.lon + (Math.random() - 0.5) * 0.02;
                    heatData.push([lat, lon, zona.peso]);
                }
            });
            
            // Crear capa de calor
            heatLayer = L.heatLayer(heatData, {
                radius: 20,
                blur: 15,
                maxZoom: 14,
                gradient: {
                    0.2: '#0000ff',
                    0.4: '#00ff00',
                    0.6: '#ffff00',
                    0.8: '#ff8000',
                    1.0: '#ff0000'
                }
            }).addTo(map);
            
            // Agregar estaciones actuales
            estacionesRunni.forEach(est => {
                const marker = L.marker([est.lat, est.lon], {
                    icon: L.divIcon({
                        className: 'custom-marker',
                        html: '<div style="font-size: 28px;">⚡</div>',
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    })
                }).addTo(map);
                
                marker.bindPopup(`<b>${est.nombre}</b><br><small>Estación actual Runni</small>`);
                currentLayers.push(marker);
                
                // Radio de cobertura
                const circle = L.circle([est.lat, est.lon], {
                    radius: 2000,
                    color: '#3498db',
                    fillColor: '#3498db',
                    fillOpacity: 0.1
                }).addTo(map);
                currentLayers.push(circle);
            });
            
            // Zonas de oportunidad
            zonasRestaurantes.filter(z => z.peso >= 0.6).forEach(zona => {
                const tieneEstacion = estacionesRunni.some(est => {
                    const dist = Math.sqrt(Math.pow(zona.lat - est.lat, 2) + Math.pow(zona.lon - est.lon, 2));
                    return dist < 0.02;
                });
                
                if (!tieneEstacion) {
                    const circle = L.circleMarker([zona.lat, zona.lon], {
                        radius: 15,
                        color: '#2ecc71',
                        fillColor: '#2ecc71',
                        fillOpacity: 0.4
                    }).addTo(map);
                    
                    circle.bindPopup(`
                        <b>🚀 Zona de Oportunidad</b><br>
                        ${zona.nombre}<br>
                        <small>Score: ${(zona.peso * 100).toFixed(0)}/100</small>
                    `);
                    currentLayers.push(circle);
                }
            });
            
            document.getElementById('infoTitle').textContent = 'Mapa de Domicilios';
            document.getElementById('infoText').innerHTML = `
                <strong>Densidad de restaurantes y negocios de comida</strong><br><br>
                Datos de OpenStreetMap para identificar zonas con alta demanda potencial de domicilios.<br><br>
                <b>Zonas prioritarias sin cobertura:</b><br>
                • Envigado Centro<br>
                • Bello Centro<br>
                • Sabaneta
            `;
            
            document.getElementById('legend').innerHTML = `
                <b>Leyenda - Domicilios</b><br><br>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff0000"></div>
                    <span>Alta densidad</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ff8000"></div>
                    <span>Densidad media-alta</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #ffff00"></div>
                    <span>Densidad media</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #00ff00"></div>
                    <span>Densidad baja</span>
                </div>
                <div class="legend-item">
                    <span>⚡ Estación actual</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #2ecc71; border-radius: 50%;"></div>
                    <span>Zona oportunidad</span>
                </div>
            `;
        }
        
        // ============================================================
        // MAPA 3: MAPA RUNNI (USO DE BICICLETAS)
        // ============================================================
        
        function showMapaRunni() {
            map.setView(VALLE_CENTER, 12);
            
            // Generar puntos para el heatmap de uso
            let heatData = [];
            zonasRunni.forEach(zona => {
                for (let i = 0; i < zona.actividad; i++) {
                    const lat = zona.lat + (Math.random() - 0.5) * 0.03;
                    const lon = zona.lon + (Math.random() - 0.5) * 0.03;
                    heatData.push([lat, lon, 0.8]);
                }
            });
            
            heatLayer = L.heatLayer(heatData, {
                radius: 18,
                blur: 12,
                maxZoom: 13,
                gradient: {
                    0.2: '#3498db',
                    0.5: '#2ecc71',
                    0.8: '#f39c12',
                    1.0: '#e74c3c'
                }
            }).addTo(map);
            
            // Estaciones actuales
            estacionesRunni.forEach(est => {
                const marker = L.marker([est.lat, est.lon], {
                    icon: L.divIcon({
                        className: 'custom-marker',
                        html: '<div style="font-size: 28px;">⚡</div>',
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    })
                }).addTo(map);
                marker.bindPopup(`<b>${est.nombre}</b>`);
                currentLayers.push(marker);
            });
            
            // Zonas de expansión
            const zonasExpansion = [
                { nombre: "Envigado Centro", lat: 6.1752, lon: -75.5940, score: "Alto" },
                { nombre: "Sabaneta", lat: 6.1514, lon: -75.6160, score: "Medio-Alto" },
                { nombre: "Itagüí", lat: 6.1849, lon: -75.5990, score: "Medio" },
                { nombre: "Bello Centro", lat: 6.3389, lon: -75.5578, score: "Alto" }
            ];
            
            zonasExpansion.forEach(zona => {
                const color = zona.score === 'Alto' ? '#2ecc71' : zona.score === 'Medio-Alto' ? '#f39c12' : '#95a5a6';
                
                const circle = L.circleMarker([zona.lat, zona.lon], {
                    radius: 20,
                    color: color,
                    fillColor: color,
                    fillOpacity: 0.3
                }).addTo(map);
                
                circle.bindPopup(`
                    <b>🚀 ${zona.nombre}</b><br>
                    Score de expansión: <b>${zona.score}</b>
                `);
                currentLayers.push(circle);
            });
            
            document.getElementById('infoTitle').textContent = 'Mapa Runni - Uso de Bicicletas';
