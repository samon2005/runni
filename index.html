<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUNNI - Domicilios en Bicicleta</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet Routing Machine CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: white;
        }
        
        .header {
            background: linear-gradient(135deg, #FF6B35 0%, #F7931E 50%, #FF8C42 100%);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo h1 {
            font-size: 1.8rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .logo span {
            font-size: 0.9rem;
            opacity: 0.95;
        }
        
        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            padding: 10px 20px;
            border: 2px solid white;
            background: transparent;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .nav-btn:hover {
            background: white;
            color: #FF6B35;
        }
        
        .nav-btn.active {
            background: white;
            color: #FF6B35;
        }
        
        #map {
            height: calc(100vh - 70px);
            width: 100%;
        }
        
        .info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            color: #333;
            max-width: 320px;
            z-index: 1000;
            border-left: 4px solid #FF6B35;
        }
        
        .info-panel h3 {
            margin-bottom: 10px;
            color: #FF6B35;
            font-size: 1.1rem;
        }
        
        .info-panel p {
            font-size: 0.85rem;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        
        .legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            color: #333;
            z-index: 1000;
            font-size: 0.85rem;
            border-left: 4px solid #FF6B35;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 5px 0;
        }
        
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px 50px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 2000;
            text-align: center;
            color: #333;
        }
        
        .loading.hidden {
            display: none;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #FF6B35;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Ocultar panel de routing */
        .leaflet-routing-container {
            display: none !important;
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 10px 15px;
            }
            .logo h1 {
                font-size: 1.3rem;
            }
            .nav-btn {
                padding: 8px 15px;
                font-size: 0.8rem;
            }
            .info-panel, .legend {
                max-width: 250px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>RUNNI</h1>
            <span>Domicilios en Bicicleta - Valle de Aburrá</span>
        </div>
        <div class="nav-buttons">
            <button class="nav-btn active" onclick="showMap('rutas', this)">Rutas Bello</button>
            <button class="nav-btn" onclick="showMap('domicilios', this)">Mapa Domicilios</button>
            <button class="nav-btn" onclick="showMap('runni', this)">Mapa Runni</button>
        </div>
    </div>
    
    <div id="map"></div>
    
    <div class="info-panel" id="infoPanel">
        <h3 id="infoTitle">Rutas Comerciales - Bello</h3>
        <p id="infoText">Rutas óptimas para domiciliarios Runni en zonas comerciales de Bello.</p>
    </div>
    
    <div class="legend" id="legend"></div>
    
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Cargando mapa...</p>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Leaflet Heat -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <!-- Leaflet Routing Machine -->
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        // ============================================================
        // CONFIGURACIÓN INICIAL
        // ============================================================
        
        let map;
        let currentLayers = [];
        let heatLayer = null;
        let routingControls = [];
        
        // Centro de Bello
        const BELLO_CENTER = [6.3389, -75.5578];
        // Centro Valle de Aburrá
        const VALLE_CENTER = [6.2200, -75.5800];
        
        // Colores Runni (naranja)
        const COLORS = {
            primary: '#FF6B35',
            secondary: '#F7931E',
            accent: '#FF8C42',
            dark: '#E55A2B',
            light: '#FFB088'
        };
        
        // ============================================================
        // ZONAS COMERCIALES DE BELLO (Para rutas de domicilios)
        // ============================================================
        
        const zonasComerciales = [
            { 
                nombre: "Centro Comercial Puerta del Norte", 
                lat: 6.3318, lon: -75.5472,
                tipo: "mall",
                descripcion: "Principal centro comercial, alta demanda de domicilios"
            },
            { 
                nombre: "Parque Principal de Bello", 
                lat: 6.3389, lon: -75.5578,
                tipo: "centro",
                descripcion: "Centro histórico, zona de restaurantes"
            },
            { 
                nombre: "Estación Metro Niquía", 
                lat: 6.3516, lon: -75.5365,
                tipo: "metro",
                descripcion: "Zona comercial alrededor del metro"
            },
            { 
                nombre: "Estación Metro Bello", 
                lat: 6.3375, lon: -75.5555,
                tipo: "metro",
                descripcion: "Alta afluencia, comercio local"
            },
            { 
                nombre: "Sector Manchester", 
                lat: 6.3280, lon: -75.5510,
                tipo: "comercial",
                descripcion: "Zona industrial con restaurantes"
            },
            { 
                nombre: "Cabañas - Zona Gastronómica", 
                lat: 6.3450, lon: -75.5620,
                tipo: "gastronomico",
                descripcion: "Alta concentración de restaurantes"
            },
            { 
                nombre: "Plaza de Mercado de Bello", 
                lat: 6.3400, lon: -75.5590,
                tipo: "mercado",
                descripcion: "Zona tradicional de comercio"
            },
            { 
                nombre: "Sector Zamora", 
                lat: 6.3340, lon: -75.5650,
                tipo: "comercial",
                descripcion: "Corredor comercial residencial"
            }
        ];
        
        // Rutas entre zonas comerciales (puntos de paso por calles reales)
        const rutasComerciales = [
            {
                nombre: "Ruta Centro - Puerta del Norte",
                descripcion: "Conecta el centro con el mall principal",
                tipo: "principal",
                waypoints: [
                    [6.3389, -75.5578], // Parque Principal
                    [6.3385, -75.5570], // Sur Parque
                    [6.3380, -75.5560], // Calle 51
                    [6.3375, -75.5548], // Metro Bello
                    [6.3368, -75.5535], // Calle 50
                    [6.3360, -75.5520], // Carrera 48
                    [6.3350, -75.5510], // Calle 49
                    [6.3340, -75.5495], // Carrera 47
                    [6.3328, -75.5478], // Calle 48
                    [6.3318, -75.5472]  // Puerta del Norte
                ]
            },
            {
                nombre: "Ruta Metro Niquía - Centro",
                descripcion: "Eje norte-sur por la avenida principal",
                tipo: "principal",
                waypoints: [
                    [6.3516, -75.5365], // Metro Niquía
                    [6.3505, -75.5378], // Calle 55
                    [6.3495, -75.5390], // Carrera 50
                    [6.3480, -75.5405], // Calle 54
                    [6.3468, -75.5420], // Carrera 49
                    [6.3455, -75.5435], // Calle 53
                    [6.3440, -75.5455], // Carrera 48
                    [6.3428, -75.5470], // Calle 52
                    [6.3415, -75.5485], // Carrera 48A
                    [6.3400, -75.5505], // Calle 51
                    [6.3388, -75.5520], // Carrera 48
                    [6.3375, -75.5555]  // Metro Bello
                ]
            },
            {
                nombre: "Ruta Cabañas - Plaza de Mercado",
                descripcion: "Zona gastronómica hacia el mercado",
                tipo: "gastronomica",
                waypoints: [
                    [6.3450, -75.5620], // Cabañas
                    [6.3445, -75.5615], // Sur Cabañas
                    [6.3438, -75.5610], // Carrera 50
                    [6.3428, -75.5605], // Calle 50
                    [6.3420, -75.5600], // Carrera 49
                    [6.3410, -75.5595], // Calle 50A
                    [6.3405, -75.5592], // Carrera 48
                    [6.3400, -75.5590]  // Plaza de Mercado
                ]
            },
            {
                nombre: "Ruta Manchester - Metro Bello",
                descripcion: "Conecta zona industrial con el metro",
                tipo: "secundaria",
                waypoints: [
                    [6.3280, -75.5510], // Manchester
                    [6.3288, -75.5515], // Carrera 49
                    [6.3298, -75.5520], // Calle 47
                    [6.3310, -75.5525], // Carrera 49
                    [6.3320, -75.5530], // Calle 48
                    [6.3332, -75.5535], // Carrera 49A
                    [6.3345, -75.5542], // Calle 49
                    [6.3358, -75.5548], // Carrera 48
                    [6.3368, -75.5552], // Calle 50
                    [6.3375, -75.5555]  // Metro Bello
                ]
            },
            {
                nombre: "Ruta Zamora - Centro",
                descripcion: "Corredor comercial occidental",
                tipo: "secundaria",
                waypoints: [
                    [6.3340, -75.5650], // Zamora
                    [6.3342, -75.5640], // Norte Zamora
                    [6.3345, -75.5628], // Carrera 51
                    [6.3350, -75.5620], // Calle 51
                    [6.3355, -75.5610], // Carrera 50
                    [6.3360, -75.5600], // Calle 51
                    [6.3370, -75.5590], // Carrera 49
                    [6.3380, -75.5585], // Calle 50
                    [6.3389, -75.5578]  // Centro
                ]
            },
            {
                nombre: "Circuito Centro Comercial",
                descripcion: "Recorrido por el centro de Bello",
                tipo: "circuito",
                waypoints: [
                    [6.3389, -75.5578], // Parque Principal
                    [6.3392, -75.5585], // Carrera 48
                    [6.3400, -75.5590], // Plaza de Mercado
                    [6.3408, -75.5585], // Carrera 49
                    [6.3410, -75.5575], // Calle 50
                    [6.3405, -75.5565], // Carrera 48
                    [6.3398, -75.5560], // Calle 50
                    [6.3392, -75.5568], // Carrera 47
                    [6.3395, -75.5555], // Calle 50A
                    [6.3389, -75.5578]  // Regreso a Parque Principal
                ]
            }
        ];
        
        // ============================================================
        // DATOS DE RESTAURANTES (MAPA DOMICILIOS)
        // ============================================================
        
        const zonasRestaurantes = [
            { nombre: "El Poblado / Parque Lleras", lat: 6.2086, lon: -75.5680, peso: 1.0, cantidad: 80 },
            { nombre: "Envigado Centro", lat: 6.1752, lon: -75.5940, peso: 0.9, cantidad: 60 },
            { nombre: "Laureles / Estadio", lat: 6.2480, lon: -75.5897, peso: 0.8, cantidad: 55 },
            { nombre: "Sabaneta Parque", lat: 6.1514, lon: -75.6160, peso: 0.7, cantidad: 40 },
            { nombre: "Itagüí Centro", lat: 6.1849, lon: -75.5990, peso: 0.6, cantidad: 35 },
            { nombre: "Av. El Poblado", lat: 6.1950, lon: -75.5760, peso: 0.85, cantidad: 45 },
            { nombre: "Bello Centro", lat: 6.3389, lon: -75.5578, peso: 0.5, cantidad: 30 },
            { nombre: "Centro Medellín", lat: 6.2518, lon: -75.5636, peso: 0.9, cantidad: 70 },
            { nombre: "Belén", lat: 6.2350, lon: -75.6100, peso: 0.6, cantidad: 40 },
            { nombre: "Robledo", lat: 6.2700, lon: -75.5950, peso: 0.5, cantidad: 25 },
            { nombre: "Sabaneta Sur / La Doctora", lat: 6.1400, lon: -75.6180, peso: 0.6, cantidad: 20 },
            { nombre: "Caldas", lat: 6.0940, lon: -75.6350, peso: 0.4, cantidad: 15 }
        ];
        
        // ============================================================
        // DATOS USO BICICLETAS (MAPA RUNNI)
        // ============================================================
        
        const zonasRunni = [
            { nombre: "El Poblado", lat: 6.2086, lon: -75.5680, actividad: 150 },
            { nombre: "Envigado Centro", lat: 6.1752, lon: -75.5940, actividad: 120 },
            { nombre: "Laureles", lat: 6.2441, lon: -75.5897, actividad: 100 },
            { nombre: "Sabaneta", lat: 6.1514, lon: -75.6160, actividad: 80 },
            { nombre: "Itagüí Centro", lat: 6.1849, lon: -75.5990, actividad: 70 },
            { nombre: "Av. El Poblado", lat: 6.1900, lon: -75.5750, actividad: 90 },
            { nombre: "Bello Centro", lat: 6.3389, lon: -75.5578, actividad: 50 },
            { nombre: "Estadio", lat: 6.2567, lon: -75.5894, actividad: 60 }
        ];
        
        // Estaciones actuales Runni
        const estacionesRunni = [
            { nombre: "Sede principal - Socya Guayabal", lat: 6.2321, lon: -75.5815 },
            { nombre: "Estación Laureles", lat: 6.2441, lon: -75.5897 },
            { nombre: "Estación Olaya Herrera (nuevo)", lat: 6.2138, lon: -75.5852 }
        ];
        
        // ============================================================
        // INICIALIZACIÓN DEL MAPA
        // ============================================================
        
        function initMap() {
            try {
                map = L.map('map').setView(BELLO_CENTER, 14);
                
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap © CARTO',
                    maxZoom: 19
                }).addTo(map);
                
                // Mostrar rutas de Bello por defecto
                showRutasBello();
                
                // Ocultar loading
                document.getElementById('loading').classList.add('hidden');
            } catch (error) {
                console.error('Error inicializando mapa:', error);
                document.getElementById('loading').innerHTML = '<p>Error cargando el mapa. Recarga la página.</p>';
            }
        }
        
        // ============================================================
        // FUNCIONES DE VISUALIZACIÓN
        // ============================================================
        
        function clearLayers() {
            currentLayers.forEach(layer => {
                try {
                    map.removeLayer(layer);
                } catch(e) {}
            });
            currentLayers = [];
            
            if (heatLayer) {
                try {
                    map.removeLayer(heatLayer);
                } catch(e) {}
                heatLayer = null;
            }
            
            routingControls.forEach(control => {
                try {
                    map.removeControl(control);
                } catch(e) {}
            });
            routingControls = [];
        }
        
        function updateButtons(clickedBtn) {
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (clickedBtn) {
                clickedBtn.classList.add('active');
            }
        }
        
        function showMap(tipo, btn) {
            clearLayers();
            updateButtons(btn);
            
            switch(tipo) {
                case 'rutas':
                    showRutasBello();
                    break;
                case 'domicilios':
                    showMapaDomicilios();
                    break;
                case 'runni':
                    showMapaRunni();
                    break;
            }
        }
        
        // ============================================================
        // MAPA 1: RUTAS COMERCIALES DE BELLO
        // ============================================================
        
        function showRutasBello() {
            map.setView(BELLO_CENTER, 14);
            
            const coloresRuta = {
                principal: COLORS.primary,
                gastronomica: COLORS.secondary,
                secundaria: COLORS.accent,
                circuito: COLORS.dark
            };
            
            // Dibujar rutas siguiendo las calles
            rutasComerciales.forEach(ruta => {
                const polyline = L.polyline(ruta.waypoints, {
                    color: coloresRuta[ruta.tipo] || COLORS.primary,
                    weight: ruta.tipo === 'principal' ? 6 : 4,
                    opacity: 0.85,
                    smoothFactor: 1,
                    lineJoin: 'round'
                }).addTo(map);
                
                polyline.bindPopup(`
                    <div style="min-width: 200px;">
                        <h4 style="color: ${COLORS.primary}; margin: 0 0 8px 0;">${ruta.nombre}</h4>
                        <p style="margin: 0; font-size: 13px;">${ruta.descripcion}</p>
                        <span style="display: inline-block; margin-top: 8px; padding: 3px 8px; background: ${coloresRuta[ruta.tipo]}; color: white; border-radius: 12px; font-size: 11px;">
                            Ruta ${ruta.tipo}
                        </span>
                    </div>
                `);
                
                currentLayers.push(polyline);
            });
            
            // Dibujar zonas comerciales
            const iconosTipo = {
                mall: '🛒',
                centro: '🏛️',
                metro: '🚇',
                comercial: '🏪',
                gastronomico: '🍽️',
                mercado: '🥬'
            };
            
            zonasComerciales.forEach(zona => {
                const marker = L.marker([zona.lat, zona.lon], {
                    icon: L.divIcon({
                        className: 'custom-marker',
                        html: `<div style="
                            font-size: 26px; 
                            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
                            background: white;
                            border-radius: 50%;
                            width: 36px;
                            height: 36px;
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
                        ">${iconosTipo[zona.tipo] || '📍'}</div>`,
                        iconSize: [36, 36],
                        iconAnchor: [18, 18]
                    })
                }).addTo(map);
                
                marker.bindPopup(`
                    <div style="min-width: 180px;">
                        <h4 style="color: ${COLORS.primary}; margin: 0 0 8px 0;">${zona.nombre}</h4>
                        <p style="margin: 0; font-size: 13px; color: #666;">${zona.descripcion}</p>
                    </div>
                `);
                
                currentLayers.push(marker);
            });
            
            // Punto sugerido para estación Runni en Bello
            const estacionSugerida = L.marker([6.3389, -75.5578], {
                icon: L.divIcon({
                    className: 'runni-station',
                    html: `<div style="
                        background: ${COLORS.primary};
                        color: white;
                        padding: 8px 12px;
                        border-radius: 20px;
                        font-weight: bold;
                        font-size: 12px;
                        white-space: nowrap;
                        box-shadow: 0 3px 10px rgba(255,107,53,0.4);
                    ">🚲 Estación Runni Sugerida</div>`,
                    iconSize: [150, 30],
                    iconAnchor: [75, 40]
                })
            }).addTo(map);
            currentLayers.push(estacionSugerida);
            
            // Actualizar panel de información
            document.getElementById('infoTitle').textContent = 'Rutas Comerciales - Bello';
            document.getElementById('infoText').innerHTML = `
                <strong>Rutas óptimas para domiciliarios Runni</strong><br><br>
                <b>${rutasComerciales.length} rutas</b> conectando <b>${zonasComerciales.length} zonas comerciales</b> en Bello.<br><br>
                <b>Zonas de alta demanda:</b><br>
                • Puerta del Norte (Mall)<br>
                • Cabañas (Gastronómico)<br>
                • Centro de Bello
            `;
            
            // Actualizar leyenda
            document.getElementById('legend').innerHTML = `
                <b style="color: ${COLORS.primary};">Leyenda - Rutas Bello</b><br><br>
                <div class="legend-item">
                    <div class="legend-color" style="background: ${COLORS.primary}"></div>
                    <span>Ruta principal</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: ${COLORS.secondary}"></div>
                    <span>Ruta gastronómica</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: ${COLORS.accent}"></div>
                    <span>Ruta secundaria</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: ${COLORS.dark}"></div>
                    <span>Circuito</span>
                </div>
                <br>
                <div class="legend-item">🛒 Centro comercial</div>
                <div class="legend-item">🍽️ Zona gastronómica</div>
                <div class="legend-item">🚇 Estación Metro</div>
                <div class="legend-item">🚲 Estación sugerida</div>
            `;
        }
        
        // ============================================================
        // MAPA 2: MAPA DE DOMICILIOS (CALOR)
        // ============================================================
        
        function showMapaDomicilios() {
            map.setView(VALLE_CENTER, 12);
            
            // Generar puntos para el heatmap
            let heatData = [];
            zonasRestaurantes.forEach(zona => {
                for (let i = 0; i < zona.cantidad; i++) {
                    const lat = zona.lat + (Math.random() - 0.5) * 0.02;
                    const lon = zona.lon + (Math.random() - 0.5) * 0.02;
                    heatData.push([lat, lon, zona.peso]);
                }
            });
            
            // Crear capa de calor con colores naranja
            heatLayer = L.heatLayer(heatData, {
                radius: 20,
                blur: 15,
                maxZoom: 14,
                gradient: {
                    0.2: '#FFE4D6',
                    0.4: '#FFB088',
                    0.6: '#FF8C42',
                    0.8: '#FF6B35',
                    1.0: '#E55A2B'
                }
            }).addTo(map);
            
            // Agregar estaciones actuales
            estacionesRunni.forEach(est => {
                const marker = L.marker([est.lat, est.lon], {
                    icon: L.divIcon({
                        className: 'custom-marker',
                        html: `<div style="font-size: 28px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));">⚡</div>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    })
                }).addTo(map);
                
                marker.bindPopup(`<b style="color: ${COLORS.primary}">${est.nombre}</b><br><small>Estación actual Runni</small>`);
                currentLayers.push(marker);
                
                // Radio de cobertura
                const circle = L.circle([est.lat, est.lon], {
                    radius: 2000,
                    color: COLORS.primary,
                    fillColor: COLORS.primary,
                    fillOpacity: 0.1
                }).addTo(map);
                currentLayers.push(circle);
            });
            
            // Zonas de oportunidad
            zonasRestaurantes.filter(z => z.peso >= 0.6).forEach(zona => {
                const tieneEstacion = estacionesRunni.some(est => {
                    const dist = Math.sqrt(Math.pow(zona.lat - est.lat, 2) + Math.pow(zona.lon - est.lon, 2));
                    return dist < 0.02;
                });
                
                if (!tieneEstacion) {
                    const circle = L.circleMarker([zona.lat, zona.lon], {
                        radius: 15,
                        color: COLORS.secondary,
                        fillColor: COLORS.secondary,
                        fillOpacity: 0.4
                    }).addTo(map);
                    
                    circle.bindPopup(`
                        <b style="color: ${COLORS.primary};">🚀 Zona de Oportunidad</b><br>
                        ${zona.nombre}<br>
                        <small>Score: ${(zona.peso * 100).toFixed(0)}/100</small>
                    `);
                    currentLayers.push(circle);
                }
            });
            
            document.getElementById('infoTitle').textContent = 'Mapa de Domicilios';
            document.getElementById('infoText').innerHTML = `
                <strong>Densidad de restaurantes y negocios</strong><br><br>
                Datos de OpenStreetMap para identificar zonas con alta demanda de domicilios.<br><br>
                <b>Zonas prioritarias sin cobertura:</b><br>
                • Envigado Centro<br>
                • Bello Centro<br>
                • Sabaneta
            `;
            
            document.getElementById('legend').innerHTML = `
                <b style="color: ${COLORS.primary};">Leyenda - Domicilios</b><br><br>
                <div class="legend-item">
                    <div class="legend-color" style="background: ${COLORS.dark}"></div>
                    <span>Alta densidad</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: ${COLORS.primary}"></div>
                    <span>Densidad media-alta</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: ${COLORS.accent}"></div>
                    <span>Densidad media</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: ${COLORS.light}"></div>
                    <span>Densidad baja</span>
                </div>
                <br>
                <div class="legend-item">⚡ Estación actual</div>
                <div class="legend-item">
                    <div class="legend-color" style="background: ${COLORS.secondary}; border-radius: 50%;"></div>
                    <span>Zona oportunidad</span>
                </div>
            `;
        }
        
        // ============================================================
        // MAPA 3: MAPA RUNNI (USO DE BICICLETAS)
        // ============================================================
        
        function showMapaRunni() {
            map.setView(VALLE_CENTER, 12);
            
            // Generar puntos para el heatmap de uso
            let heatData = [];
            zonasRunni.forEach(zona => {
                for (let i = 0; i < zona.actividad; i++) {
                    const lat = zona.lat + (Math.random() - 0.5) * 0.03;
                    const lon = zona.lon + (Math.random() - 0.5) * 0.03;
                    heatData.push([lat, lon, 0.8]);
                }
            });
            
            heatLayer = L.heatLayer(heatData, {
                radius: 18,
                blur: 12,
                maxZoom: 13,
                gradient: {
                    0.2: '#FFE4D6',
                    0.4: '#FFB088',
                    0.6: '#FF8C42',
                    0.8: '#FF6B35',
                    1.0: '#E55A2B'
                }
            }).addTo(map);
            
            // Estaciones actuales
            estacionesRunni.forEach(est => {
                const marker = L.marker([est.lat, est.lon], {
                    icon: L.divIcon({
                        className: 'custom-marker',
                        html: `<div style="font-size: 28px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));">⚡</div>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    })
                }).addTo(map);
                marker.bindPopup(`<b style="color: ${COLORS.primary}">${est.nombre}</b>`);
                currentLayers.push(marker);
            });
            
            // Zonas de expansión
            const zonasExpansion = [
                { nombre: "Envigado Centro", lat: 6.1752, lon: -75.5940, score: "Alto" },
                { nombre: "Sabaneta", lat: 6.1514, lon: -75.6160, score: "Medio-Alto" },
                { nombre: "Itagüí", lat: 6.1849, lon: -75.5990, score: "Medio" },
                { nombre: "Bello Centro", lat: 6.3389, lon: -75.5578, score: "Alto" }
            ];
            
            zonasExpansion.forEach(zona => {
                const color = zona.score === 'Alto' ? COLORS.primary : 
                              zona.score === 'Medio-Alto' ? COLORS.secondary : COLORS.light;
                
                const circle = L.circleMarker([zona.lat, zona.lon], {
                    radius: 20,
                    color: color,
                    fillColor: color,
                    fillOpacity: 0.3
                }).addTo(map);
                
                circle.bindPopup(`
                    <b style="color: ${COLORS.primary};">🚀 ${zona.nombre}</b><br>
                    Score de expansión: <b>${zona.score}</b>
                `);
                currentLayers.push(circle);
            });
            
            document.getElementById('infoTitle').textContent = 'Mapa Runni - Uso de Bicicletas';
            document.getElementById('infoText').innerHTML = `
                <strong>Patrones de uso de bicicletas Runni</strong><br><br>
                Visualización de actividad para identificar zonas de expansión.<br><br>
                <b>Top zonas para expansión:</b><br>
                • Bello Centro (Score: Alto)<br>
                • Envigado Centro (Score: Alto)<br>
                • Sabaneta (Score: Medio-Alto)
            `;
            
            document.getElementById('legend').innerHTML = `
                <b style="color: ${COLORS.primary};">Leyenda - Uso Runni</b><br><br>
                <div class="legend-item">
                    <div class="legend-color" style="background: ${COLORS.dark}"></div>
                    <span>Alta actividad</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: ${COLORS.primary}"></div>
                    <span>Actividad media</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: ${COLORS.light}"></div>
                    <span>Actividad baja</span>
                </div>
                <br>
                <div class="legend-item">⚡ Estación actual</div>
                <div class="legend-item">
                    <div class="legend-color" style="background: ${COLORS.primary}; border-radius: 50%;"></div>
                    <span>Zona expansión prioritaria</span>
                </div>
            `;
        }
        
        // Inicializar cuando cargue la página
        window.onload = initMap;
    </script>
</body>
</html>
